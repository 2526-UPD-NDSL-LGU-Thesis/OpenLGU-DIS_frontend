packages:
  # Specifies that all **direct** subdirectories of the directories below will be treated as a package (i.e., like a separate project))
  # Change as required
  - 'apps/*' # These are applications and services that will be built and deployed separately.
  - 'docs/*' # These are documentation websites modeling docs as code philsophy. Different sites for different end users.
  - 'libraries/*' # These are shared libraries and components that will be used across multiple applications and services. Think of it as your own internal dependency

